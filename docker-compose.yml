services:
  dozzle-llm-watch:
    build: .
    container_name: dozzle-llm-watch
    restart: unless-stopped
    # host network so container can reach Ollama (11434) and ntfy (2586) on localhost
    network_mode: host
    volumes:
      # config is read at startup — edit on host, restart container to apply
      - ./config.yaml:/opt/dozzle-llm-watch/config.yaml:ro
      # DB is read/write — persisted on the host
      - ./events.sqlite3:/opt/dozzle-llm-watch/events.sqlite3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
