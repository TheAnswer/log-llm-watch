server:
  host: 0.0.0.0
  port: 8088

storage:
  db_path: /opt/dozzle-llm-watch/events.sqlite3

ollama:
  url: http://localhost:11434
  model: qwen3.5:9b
  timeout_seconds: 300

analysis:
  batch_window_minutes: 1
  max_examples_per_group: 5
  min_events_before_analysis: 1
  ignore_if_older_than_hours: 24

daily_report:
  enabled: true
  hour: 9
  minute: 0
  lookback_hours: 24

weekly_report:
  enabled: true
  weekday: 0
  hour: 9
  minute: 0
  lookback_days: 7

retention:
  events_days: 14
  daily_runs_days: 180
  weekly_runs_days: 365
  housekeeping_runs_days: 365
  analysis_runs_days: 30

incidents:
  open_window_minutes: 10
  close_after_minutes: 30

node_metadata:
  unraid:
    host_type: unraid
    role: storage
    subnet: 192.168.2.0/24

  proxmox:
    host_type: proxmox
    role: hypervisor
    subnet: 192.168.2.0/24

  proxmox-venus:
    host_type: proxmox
    role: hypervisor
    subnet: 192.168.2.0/24

  theanswer-standard-pc-q35-ich9-2009:
    host_type: vm
    role: observability
    subnet: 192.168.2.0/24

  theanswer-pc:
    host_type: windows
    role: workstation
    subnet: 192.168.2.0/24

service_metadata:
  nxlog-unraid:
    app_stack: monitoring

  dozzle-webhook:
    app_stack: monitoring

  ntfy:
    app_stack: notifications

  nginx-proxy-manager:
    app_stack: proxy

  syslog:
    app_stack: monitoring

notify:
  method: ntfy
  ntfy_url: http://localhost:2586/nas_log_alerts
  title: "NAS log alert"

filters:
  ignore_message_regex:
    - '(?i)deprecated'
    - '(?i)healthcheck'
    - '(?i)ping'
    - '(?i)client disconnected'
    - '(?i)broken pipe'
    - '(?i)favicon'
    - '(?i)metrics'
    - '(?i)broadcast failed'
    - '(?i)http server disconnected while reading the response'
    - '(?i)\busbhid-ups\b.*\bInput/Output Error\b'
    - '(?i)\bmonitor_nchan: Stop running nchan processes\b'
    - '(?i)\bautofan: Highest disk temp is\b'
    - '(?i)\bupsd\[\d+\]: User .* logged into UPS \[ups\]\b'
